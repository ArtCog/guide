<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>guide.arturx.art | Доступ через Telegram</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <style>
        .gate-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .gate-terminal {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2.5rem 3rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 0 40px rgba(88, 166, 255, 0.08);
        }
        .gate-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .gate-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            color: #58a6ff;
            margin-bottom: 0.5rem;
        }
        .gate-subtitle {
            color: #8b949e;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .gate-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            padding: 0.8rem 1.8rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .gate-btn:hover {
            background: #1d4ed8;
        }
        .gate-hint {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #484f58;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>
    <div class="gate-wrapper">
        <div class="gate-terminal">
            <div class="gate-icon">🔒</div>
            <div class="gate-title">access denied</div>
            <p class="gate-subtitle">
                Материалы доступны только через Telegram-канал.<br>
                Вступи в канал — там всё: гайды, скиллы, обновления.
            </p>
            <a class="gate-btn" href="https://t.me/+K0Dd9yQNr8wyZjZi">
                <span>✈️</span> Вступить в канал
            </a>
            <div class="gate-hint">→ Telegram-канал [ИИмерсивный]</div>
        </div>
    </div>
</body>
</html>
